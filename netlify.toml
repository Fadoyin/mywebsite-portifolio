# Deploy the built site folder. Connect this repo/folder at https://app.netlify.com
# then add custom domain: taiwofadoyin.co.uk (+ www)

[build]
  command = "python3 build-site.py"
  publish = "site"

[build.environment]
  PYTHON_VERSION = "3.11"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
