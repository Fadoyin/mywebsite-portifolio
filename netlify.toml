# Deploy the built site folder. Connect this repo/folder at https://app.netlify.com
# then add custom domain: taiwofadoyin.co.uk (+ www)

[build]
  command = "python3 build-site.py"
  publish = "site"

[build.environment]
  PYTHON_VERSION = "3.11"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Always show taiwofadoyin.co.uk in the browser bar (not the *.netlify.app URL).
[[redirects]]
  from = "https://silver-salamander-e34651.netlify.app/*"
  to = "https://taiwofadoyin.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.taiwofadoyin.co.uk/*"
  to = "https://taiwofadoyin.co.uk/:splat"
  status = 301
  force = true
